name: Windows RDP (Tailscale Clean)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Enable RDP + Create User
      run: |
        net user runneradmin StrongPass123! /add
        net localgroup administrators runneradmin /add
        net localgroup "Remote Desktop Users" runneradmin /add

        reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
        netsh advfirewall firewall set rule group="remote desktop" new enable=Yes

        sc config TermService start= auto
        net start TermService

    - name: Install Tailscale
      run: |
        choco install tailscale -y

    - name: Start Tailscale Service
      run: |
        Start-Service Tailscale
        Start-Sleep -Seconds 10

    - name: Connect Tailscale
      run: |
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey tskey-auth-kBVhLEattT11CNTRL-XtTHZsvrGoJ7sQbBXDt4pJZbEXpUNNPqF --hostname github-rdp --unattended

    - name: Show IP
      run: |
        & "C:\Program Files\Tailscale\tailscale.exe" ip -4
        echo "User: runneradmin"
        echo "Password: StrongPass123!"

    - name: Keep Alive
      run: |
        Start-Sleep -Seconds 21600
