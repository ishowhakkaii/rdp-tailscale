name: Windows RDP + Tailscale

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: 'Keep session alive for (hours)'
        required: false
        default: '4'

jobs:
  rdp-session:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Set Variables
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          echo "RUNNER_USER=runneradmin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "RUNNER_PASS=$(New-Guid)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "TAILSCALE_AUTH_KEY=${{ secrets.TAILSCALE_AUTH_KEY }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create Local Admin User
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $user = $env:RUNNER_USER
          $pass = $env:RUNNER_PASS | ConvertTo-SecureString -AsPlainText -Force
          
          $exists = Get-LocalUser -Name $user -ErrorAction SilentlyContinue
          
          if (-not $exists) {
            New-LocalUser -Name $user -Password $pass -FullName "Runner Admin" -Description "GitHub Actions Runner" -ErrorAction SilentlyContinue
            Write-Host "User created: $user"
          } else {
            Set-LocalUser -Name $user -Password $pass -ErrorAction SilentlyContinue
            Write-Host "User password updated: $user"
          }
          
          $group = [ADSI]"WinNT://./Administrators"
          $member = [ADSI]"WinNT://./$user"
          
          try {
            $group.Add($member.Path)
            Write-Host "Added $user to Administrators"
          } catch {
            Write-Host "User already in Administrators or error: $_"
          }

      - name: Enable RDP
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0 -ErrorAction SilentlyContinue
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          Write-Host "RDP enabled"

      - name: Install Tailscale
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $tsPath = "C:\Program Files\Tailscale\tailscale.exe"
          
          if (-not (Test-Path $tsPath)) {
            Write-Host "Downloading Tailscale..."
            Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "$env
